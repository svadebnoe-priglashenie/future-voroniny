name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into main.js
        run: |
          sed -i "s|BOT_TOKEN_PLACEHOLDER|${{ secrets.BOT_TOKEN }}|g" js/main.js
          sed -i "s|CHAT_ID_PLACEHOLDER|${{ secrets.CHAT_ID }}|g" js/main.js
          sed -i "s|WORKER_URL_PLACEHOLDER|${{ secrets.WORKER_URL }}|g" js/main.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4